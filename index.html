<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Google Cardboard VR MVP (Fixed)</title>
    <style>
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #000;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            user-select: none; -webkit-user-select: none;
        }

        #debug-panel {
            position: absolute; top: 10px; left: 10px;
            background-color: rgba(0,0,0,0.8);
            color: #0f0; padding: 10px; border-radius: 5px;
            font-family: monospace; font-size: 12px; line-height: 1.7;
            z-index: 1000; pointer-events: none; border: 1px solid #0f0;
        }
        .dbg-ok  { color: #0f0; }
        .dbg-warn{ color: #ff0; }
        .dbg-err { color: #f55; }

        #vr-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        #reticle { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; background-color: rgba(255,255,255,0.8); border: 2px solid rgba(0,0,0,0.5); border-radius: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 10; }
        #reticle-progress { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border: 2px solid transparent; border-top: 2px solid #fff; border-radius: 50%; transform: translate(-50%,-50%) rotate(0deg); pointer-events: none; z-index: 9; opacity: 0; transition: opacity 0.1s; }
        #popup-message { position: absolute; top: 20%; left: 50%; transform: translate(-50%,-50%); background-color: rgba(0,0,0,0.85); color: #fff; padding: 15px 30px; border-radius: 10px; font-size: 24px; font-weight: bold; box-shadow: 0 4px 20px rgba(0,0,0,0.5); opacity: 0; pointer-events: none; z-index: 20; transition: opacity 0.2s, transform 0.2s; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        #popup-message.show { opacity: 1; transform: translate(-50%,-40%); }
        #welcome-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(20,20,20,0.97); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; text-align: center; padding: 20px; box-sizing: border-box; }
        #welcome-modal h2 { margin-bottom: 8px; }
        #welcome-modal p  { margin: 4px 0; font-size: 14px; color: #aaa; }
        #https-status { font-size: 14px; margin: 12px 0 4px; }
        .btn { background-color: #ff3366; color: white; border: none; padding: 15px 40px; font-size: 18px; border-radius: 30px; cursor: pointer; margin-top: 16px; box-shadow: 0 4px 15px rgba(255,51,102,0.4); font-weight: bold; transition: background 0.2s; }
        .btn:active { background-color: #e02253; }
        #vr-toggle-btn { position: absolute; bottom: 20px; right: 20px; background-color: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); padding: 10px 20px; border-radius: 20px; cursor: pointer; z-index: 30; font-size: 14px; backdrop-filter: blur(5px); }

        /* ======================================================
           HTTPS警告バナー（file://で開いたとき表示）
           ====================================================== */
        #https-banner {
            display: none;
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            background-color: rgba(200,50,0,0.92); color: #fff;
            padding: 12px 18px; border-radius: 8px; font-size: 13px;
            z-index: 50; text-align: center; max-width: 90vw; line-height: 1.6;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<!-- ========== デバッグパネル ========== -->
<div id="debug-panel">
    <div>🔒 HTTPS: <span id="dbg-https">-</span></div>
    <div>Evt: <span id="dbg-events">0</span> [<span id="dbg-evtype">-</span>]</div>
    <div>hasGyro: <span id="dbg-hasGyro">false</span></div>
    <div>α: <span id="dbg-alpha">null</span></div>
    <div>β: <span id="dbg-beta">null</span></div>
    <div>γ: <span id="dbg-gamma">null</span></div>
    <div>scrOri: <span id="dbg-screenOri">0</span></div>
    <div>Quat: <span id="dbg-quat">0,0,0,1</span></div>
    <div>Offset: <span id="dbg-offset" class="dbg-warn">pending...</span></div>
    <div>Frame: <span id="dbg-frame">0</span></div>
</div>

<div id="vr-container"></div>
<div id="reticle"></div>
<div id="reticle-progress"></div>
<div id="popup-message">Hello VR</div>

<!-- HTTPS警告（file://で開いたとき） -->
<div id="https-banner">
    ⚠️ file:// で開いています。センサーはHTTPSが必要です。<br>
    GitHub Pages / Netlify などにホストするか<br>
    <code>npx serve .</code> + ngrok を使ってください。
</div>

<div id="welcome-modal">
    <h2>VR Space Prototype</h2>
    <p>Google CardboardなどのVRゴーグルに入れてご体験ください。</p>
    <div id="https-status">確認中...</div>
    <button class="btn" id="start-btn">VRを開始する</button>
</div>
<button id="vr-toggle-btn">Cardboard（二眼）モード切替</button>

<script>
// ================================================================
//  HTTPS チェック
//  Chrome は HTTPS / localhost 以外でセンサーAPIをブロックする
// ================================================================
const isSecureContext = (
    window.isSecureContext === true ||
    location.protocol === 'https:' ||
    location.hostname === 'localhost' ||
    location.hostname === '127.0.0.1'
);

// モーダル内ステータス
const httpsStatusEl = document.getElementById('https-status');
if (isSecureContext) {
    httpsStatusEl.innerHTML = '✅ <span style="color:#6f6">HTTPS OK — センサー利用可能</span>';
} else {
    httpsStatusEl.innerHTML = '❌ <span style="color:#f66">HTTPS 未使用 — センサー無効（スワイプのみ動作）</span>';
    document.getElementById('https-banner').style.display = 'block';
}

// ================================================================
//  CONFIG / STATE
// ================================================================
const CONFIG = { gazeTimeThreshold: 2000, cubeSpeed: 0.01 };
const STATE  = { isVRMode: false, gazeTarget: null, gazeTimer: null, gazeStartTime: 0, isGazeTriggered: false };

// ================================================================
//  VRApp
// ================================================================
class VRApp {
    constructor() {
        this.container   = document.getElementById('vr-container');
        this.scene       = null;
        this.camera      = null;
        this.renderer    = null;
        this.cameraLeft  = null;
        this.cameraRight = null;
        this.raycaster   = new THREE.Raycaster();
        this.centerPointer = new THREE.Vector2(0, 0);
        this.interactiveObjects = [];

        this.deviceOrientation = {};
        this.screenOrientation = 0;
        this.mouse  = { x: 0, y: 0, isDown: false, prevX: 0, prevY: 0 };
        this.hasGyro = false;

        this.debug = { eventCount: 0, frameCount: 0, lastEventType: '-' };
    }

    init() {
        // ----------------------------------------------------------------
        // [FIX 4] Start時の基準姿勢をリセット
        //   初回センサーフレームで基準クォータニオンを取得し、
        //   以降は相対回転だけをカメラに適用する。
        // ----------------------------------------------------------------
        this._initialQInv = null;

        this.initScene();
        this.initLights();
        this.initEnvironment();
        this.initInteractiveObjects();
        this.initControls();
        this.initResizeListener();
        this.animate();
    }

    initScene() {
        this.scene  = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.camera.position.set(0, 0, 0);

        this.cameraLeft  = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
        this.cameraRight = new THREE.PerspectiveCamera(75, (window.innerWidth / 2) / window.innerHeight, 0.1, 1000);
        this.cameraLeft.position.set(-0.03, 0, 0);
        this.cameraRight.position.set( 0.03, 0, 0);

        this.camera.add(this.cameraLeft);
        this.camera.add(this.cameraRight);
        this.scene.add(this.camera);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.container.appendChild(this.renderer.domElement);
    }

    initLights() {
        this.scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dir = new THREE.DirectionalLight(0xffffff, 0.8);
        dir.position.set(5, 10, 7);
        this.scene.add(dir);
    }

    initEnvironment() {
        const geo = new THREE.BoxGeometry(100, 100, 100);
        const mats = [
            new THREE.MeshBasicMaterial({ color: 0xffff00, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0x00ff00, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0x555555, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.BackSide }),
            new THREE.MeshBasicMaterial({ color: 0x0000ff, side: THREE.BackSide }),
        ];
        this.scene.add(new THREE.Mesh(geo, mats));
    }

    initInteractiveObjects() {
        const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, roughness: 0.3, metalness: 0.1 });
        this.cube = new THREE.Mesh(geo, mat);
        this.cube.position.set(0, 0, -5);
        this.scene.add(this.cube);
        this.interactiveObjects.push(this.cube);
    }

    initControls() {
        // ----------------------------------------------------------------
        // [FIX 1] deviceorientationabsolute を追加
        //   Chrome Android は relative な deviceorientation よりも
        //   deviceorientationabsolute を優先して発火する場合がある
        // ----------------------------------------------------------------
        const handleOrientation = (event, evType) => {
            this.debug.eventCount++;
            this.debug.lastEventType = evType;

            // [FIX 2] truthy check (alpha ? ...) のバグ修正
            //   alpha=0（真北向き）のとき truthy check は false になり
            //   常に 0 扱いになる誤りを、null/undefined チェックに変更
            if (event.alpha !== null && event.alpha !== undefined) {
                this.hasGyro = true;
                this.deviceOrientation = {
                    alpha: event.alpha,
                    beta:  event.beta,
                    gamma: event.gamma,
                };
            }
        };

        // absolute を先に登録（発火したら relative 側は無視）
        window.addEventListener('deviceorientationabsolute', (e) => {
            handleOrientation(e, 'absolute');
        }, true);

        // relative は absolute が来ていない場合のみ処理
        window.addEventListener('deviceorientation', (e) => {
            if (this.debug.lastEventType !== 'absolute') {
                handleOrientation(e, 'relative');
            }
        }, true);

        // [FIX 3] window.orientation は非推奨 → screen.orientation.angle を優先
        const getScreenOri = () =>
            (screen.orientation && screen.orientation.angle !== undefined)
                ? screen.orientation.angle
                : (window.orientation || 0);

        this.screenOrientation = getScreenOri();
        window.addEventListener('orientationchange', () => {
            this.screenOrientation = getScreenOri();
        });

        // マウス（PC）
        window.addEventListener('mousedown', (e) => {
            this.mouse.isDown = true;
            this.mouse.prevX = e.clientX; this.mouse.prevY = e.clientY;
        });
        window.addEventListener('mousemove', (e) => {
            if (!this.mouse.isDown) return;
            const dx = e.clientX - this.mouse.prevX;
            const dy = e.clientY - this.mouse.prevY;
            this.mouse.prevX = e.clientX; this.mouse.prevY = e.clientY;
            this.mouse.x += dx * 0.2;
            this.mouse.y = Math.max(-85, Math.min(85, this.mouse.y + dy * 0.2));
        });
        window.addEventListener('mouseup', () => { this.mouse.isDown = false; });

        // タッチ（スマホ）
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                this.mouse.isDown = true;
                this.mouse.prevX = e.touches[0].clientX;
                this.mouse.prevY = e.touches[0].clientY;
            }
        });
        window.addEventListener('touchmove', (e) => {
            if (!this.mouse.isDown || e.touches.length !== 1) return;
            const dx = e.touches[0].clientX - this.mouse.prevX;
            const dy = e.touches[0].clientY - this.mouse.prevY;
            this.mouse.prevX = e.touches[0].clientX;
            this.mouse.prevY = e.touches[0].clientY;
            this.mouse.x += dx * 0.2;
            this.mouse.y = Math.max(-85, Math.min(85, this.mouse.y + dy * 0.2));
        });
        window.addEventListener('touchend', () => { this.mouse.isDown = false; });
    }

    // ----------------------------------------------------------------
    // [FIX 3] デバイス姿勢クォータニオンの計算（Three.js 公式準拠）
    //
    // 旧実装の問題：乗算順序が  qAlign × q_euler × qScreen  だった。
    //   qAlign（座標系補正）を先に掛けると、その後の q_euler が
    //   補正済み空間に適用されてしまい、Yaw が正しく機能しない。
    //
    // 正しい順序： q_euler × qAlign × qScreen
    //   1. q_euler  : デバイスの絶対姿勢（世界座標系）
    //   2. qAlign   : カメラ座標系への変換（X軸 -90°）
    //                 デバイスは「上面が+Y」だが Three.js カメラは
    //                 「奥が-Z」なので、この補正で正しくマッピングされる。
    //   3. qScreen  : 画面回転（Portrait/Landscape）の補正
    //
    // これは Three.js 公式 DeviceOrientationControls と同一の実装。
    // ----------------------------------------------------------------
    _computeDeviceQ(alpha, beta, gamma, orient) {
        // Euler: デバイスの Z-X'-Y'' 回転を Three.js の YXZ 順に変換
        const euler = new THREE.Euler();
        euler.set(beta, alpha, -gamma, 'YXZ');

        // ① デバイス絶対姿勢
        const q = new THREE.Quaternion();
        q.setFromEuler(euler);

        // ② X軸 -90° 補正
        //    Quaternion(-√0.5, 0, 0, √0.5) == setFromAxisAngle(X, -PI/2) と等価
        //    Three.js 公式コードとまったく同じ定数を使用する。
        const qAlign = new THREE.Quaternion(-Math.SQRT1_2, 0, 0, Math.SQRT1_2);
        q.multiply(qAlign);

        // ③ 画面向き補正（Portrait=0°, Landscape=90° or -90°）
        const qScreen = new THREE.Quaternion();
        qScreen.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -orient);
        q.multiply(qScreen);

        return q;
    }

    updateCameraRotation() {
        if (this.hasGyro && this.deviceOrientation.alpha !== undefined) {
            const toRad = THREE.MathUtils.degToRad;
            const alpha  = this.deviceOrientation.alpha != null ? toRad(this.deviceOrientation.alpha) : 0;
            const beta   = this.deviceOrientation.beta  != null ? toRad(this.deviceOrientation.beta)  : 0;
            const gamma  = this.deviceOrientation.gamma != null ? toRad(this.deviceOrientation.gamma) : 0;
            const orient = this.screenOrientation       != null ? toRad(this.screenOrientation)       : 0;

            // 正しい順序で絶対姿勢クォータニオンを計算
            const deviceQ = this._computeDeviceQ(alpha, beta, gamma, orient);

            // ----------------------------------------------------------------
            // [FIX 4] 初期オフセット補正（相対ヘディング）
            //
            // Start時点の姿勢を基準（正面）にするため、
            // 最初のセンサーフレームで q_initial の逆数を保存し、
            // 毎フレーム  camera.quaternion = q_initial⁻¹ × q_current  を適用する。
            //
            // q_current == q_initial のとき → identity（カメラ無回転 = 正面）
            // q_current が q_initial から Δ回転したとき → カメラも Δ回転
            // ----------------------------------------------------------------
            if (!this._initialQInv) {
                // 初回フレーム：この瞬間の向きを「正面」として記録
                this._initialQInv = deviceQ.clone().invert();
            }

            // 相対クォータニオン = 初期逆 × 現在
            this.camera.quaternion
                .copy(this._initialQInv)
                .multiply(deviceQ);

        } else {
            // ジャイロなし → スワイプ操作
            const phi   = THREE.MathUtils.degToRad(90 - this.mouse.y);
            const theta = THREE.MathUtils.degToRad(this.mouse.x + 180);
            this.camera.lookAt(new THREE.Vector3(
                Math.sin(phi) * Math.sin(theta),
                Math.cos(phi),
                Math.sin(phi) * Math.cos(theta)
            ));
        }
    }

    updateGazeInteraction() {
        this.raycaster.setFromCamera(this.centerPointer, this.camera);
        const hits = this.raycaster.intersectObjects(this.interactiveObjects);
        const ring  = document.getElementById('reticle-progress');
        const popup = document.getElementById('popup-message');

        if (hits.length > 0) {
            const obj = hits[0].object;
            if (STATE.gazeTarget !== obj) {
                STATE.gazeTarget = obj; STATE.gazeStartTime = Date.now(); STATE.isGazeTriggered = false;
                ring.style.opacity = '1';
            }
            const elapsed = Date.now() - STATE.gazeStartTime;
            const pct = Math.min(elapsed / CONFIG.gazeTimeThreshold, 1);
            ring.style.transform = `translate(-50%,-50%) rotate(${pct * 360}deg)`;
            ring.style.borderWidth = `${2 + pct * 4}px`;
            if (elapsed >= CONFIG.gazeTimeThreshold && !STATE.isGazeTriggered) {
                this.onGazeTrigger(obj);
            }
        } else {
            if (STATE.gazeTarget !== null) {
                this.resetGaze();
                popup.classList.remove('show');
            }
        }
    }

    onGazeTrigger(obj) {
        STATE.isGazeTriggered = true;
        document.getElementById('popup-message').classList.add('show');
        obj.material.color.setHex(Math.random() * 0xffffff);
    }

    resetGaze() {
        STATE.gazeTarget = null; STATE.isGazeTriggered = false; STATE.gazeStartTime = 0;
        const ring = document.getElementById('reticle-progress');
        ring.style.opacity = '0'; ring.style.borderWidth = '2px';
        ring.style.transform = 'translate(-50%,-50%) rotate(0deg)';
    }

    initResizeListener() {
        window.addEventListener('resize', () => {
            const w = window.innerWidth, h = window.innerHeight;
            this.camera.aspect = w / h; this.camera.updateProjectionMatrix();
            this.cameraLeft.aspect  = (w / 2) / h; this.cameraLeft.updateProjectionMatrix();
            this.cameraRight.aspect = (w / 2) / h; this.cameraRight.updateProjectionMatrix();
            this.renderer.setSize(w, h);
        });
    }

    updateDebugPanel() {
        const httpsEl = document.getElementById('dbg-https');
        httpsEl.textContent = isSecureContext ? 'OK ✅' : 'NG ❌ センサー無効';
        httpsEl.className   = isSecureContext ? 'dbg-ok' : 'dbg-err';

        document.getElementById('dbg-events').textContent = this.debug.eventCount;
        document.getElementById('dbg-evtype').textContent = this.debug.lastEventType;

        const gyroEl = document.getElementById('dbg-hasGyro');
        gyroEl.textContent = this.hasGyro;
        gyroEl.className   = this.hasGyro ? 'dbg-ok' : 'dbg-warn';

        const d = this.deviceOrientation;
        document.getElementById('dbg-alpha').textContent = d.alpha != null ? d.alpha.toFixed(2) : 'null';
        document.getElementById('dbg-beta').textContent  = d.beta  != null ? d.beta.toFixed(2)  : 'null';
        document.getElementById('dbg-gamma').textContent = d.gamma != null ? d.gamma.toFixed(2) : 'null';
        document.getElementById('dbg-screenOri').textContent = this.screenOrientation;

        const q = this.camera.quaternion;
        document.getElementById('dbg-quat').textContent =
            `${q.x.toFixed(2)},${q.y.toFixed(2)},${q.z.toFixed(2)},${q.w.toFixed(2)}`;
        document.getElementById('dbg-frame').textContent = this.debug.frameCount;

        // 初期オフセット取得状況
        const offEl = document.getElementById('dbg-offset');
        if (offEl) {
            offEl.textContent = this._initialQInv ? 'SET ✅' : 'pending...';
            offEl.className   = this._initialQInv ? 'dbg-ok' : 'dbg-warn';
        }
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        this.debug.frameCount++;

        this.updateCameraRotation();
        this.updateGazeInteraction();
        if (this.cube) {
            this.cube.rotation.x += CONFIG.cubeSpeed;
            this.cube.rotation.y += CONFIG.cubeSpeed;
        }

        if (STATE.isVRMode) {
            const w = window.innerWidth, h = window.innerHeight;
            this.renderer.setScissorTest(true);
            this.renderer.setViewport(0, 0, w / 2, h);
            this.renderer.setScissor(0, 0, w / 2, h);
            this.renderer.render(this.scene, this.cameraLeft);
            this.renderer.setViewport(w / 2, 0, w / 2, h);
            this.renderer.setScissor(w / 2, 0, w / 2, h);
            this.renderer.render(this.scene, this.cameraRight);
            this.renderer.setScissorTest(false);
        } else {
            this.renderer.render(this.scene, this.camera);
        }

        this.updateDebugPanel();
    }
}

// ================================================================
//  起動
// ================================================================
const app = new VRApp();

document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('welcome-modal').style.display = 'none';

    // iOS 13+ は requestPermission() が必須
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
            .then(state => {
                console.log('[VR] iOS sensor permission:', state);
                app.init();
            })
            .catch(err => {
                console.warn('[VR] iOS permission error:', err);
                app.init(); // 拒否されてもUI起動
            });
    } else {
        // Android / PC
        app.init();
    }
});

document.getElementById('vr-toggle-btn').addEventListener('click', () => {
    STATE.isVRMode = !STATE.isVRMode;
    window.dispatchEvent(new Event('resize'));
});
</script>
</body>
</html>
